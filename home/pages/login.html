<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Log In – Mia Travel</title>
    <meta charset="UTF-8">
    <title>Package</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<div class="auth-card">

  <!-- HEADER -->
  <div class="auth-header">
    <span class="logo">Mia Travel</span>
    <p>Your dream journey starts here</p>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
    <button class="auth-tab" onclick="switchTab('register')">Sign Up</button>
  </div>

  <div class="auth-body">

    <!-- ═══ LOGIN PANEL ═══ -->
    <div id="loginPanel" class="panel active">
      <div class="alert alert-danger alert-auth" id="loginError"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="email@shembull.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
            <i class="bi bi-eye-slash" id="toggleLogin" onclick="togglePass('loginPassword','toggleLogin')"></i>
          </div>
        </div>
        <button type="submit" class="btn-auth">Log In</button>
      </form>

      <div class="back-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>

    <!-- ═══ REGISTER PANEL ═══ -->
    <div id="registerPanel" class="panel">
      <div class="alert alert-danger alert-auth" id="registerError"></div>
      <div class="alert alert-success alert-auth" id="registerSuccess"></div>

      <form id="registerForm">
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" id="regFirstName"
                   pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+" title="Only letters" placeholder="Arta" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" id="regLastName"
                   pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+" title="Only letters" placeholder="Muçaj" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="regEmail" placeholder="email@shembull.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" id="regPhone"
                 pattern="[0-9+\s]+" inputmode="numeric" title="Only numbers" placeholder="+355 6X XXX XXXX" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <input type="password" class="form-control" id="regPassword"
                   minlength="6" placeholder="Minimum 6 characters" required>
            <i class="bi bi-eye-slash" id="toggleReg" onclick="togglePass('regPassword','toggleReg')"></i>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="regConfirm" placeholder="Repeat your password" required>
        </div>
        <button type="submit" class="btn-auth">Create Account</button>
      </form>

      <div class="back-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>

  </div>
</div>

<script>
/* ── TAB SWITCH ─────────────────────────── */
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i === 0 && tab==='login') || (i===1 && tab==='register'));
  });
  document.getElementById('loginPanel').classList.toggle('active', tab==='login');
  document.getElementById('registerPanel').classList.toggle('active', tab==='register');
}

/* ── SHOW/HIDE PASSWORD ─────────────────── */
function togglePass(inputId, iconId) {
  const inp  = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'bi bi-eye';
  } else {
    inp.type = 'password';
    icon.className = 'bi bi-eye-slash';
  }
}

/* ── SHOW ALERT ─────────────────────────── */
function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

/* ── REGISTER ───────────────────────────── */
document.getElementById('registerForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const firstName = document.getElementById('regFirstName').value.trim();
  const lastName  = document.getElementById('regLastName').value.trim();
  const email     = document.getElementById('regEmail').value.trim();
  const phone     = document.getElementById('regPhone').value.trim();
  const password  = document.getElementById('regPassword').value;
  const confirm   = document.getElementById('regConfirm').value;

  if (password !== confirm) {
    showAlert('registerError', '❌ Passwords do not match!');
    return;
  }

  // Kontrollo nëse ekziston
  const users = JSON.parse(localStorage.getItem('miaUsers') || '[]');
  if (users.find(u => u.email === email)) {
    showAlert('registerError', '❌ This email is already registered!');
    return;
  }

  // Shto user të ri
  users.push({ firstName, lastName, email, phone, password });
  localStorage.setItem('miaUsers', JSON.stringify(users));

  showAlert('registerSuccess', '✅ Account created! You can now log in.');
  this.reset();
  setTimeout(() => switchTab('login'), 2000);
});

/* ── LOGIN ──────────────────────────────── */
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  const users = JSON.parse(localStorage.getItem('miaUsers') || '[]');
  const user  = users.find(u => u.email === email && u.password === password);

  if (!user) {
    showAlert('loginError', '❌ Incorrect email or password!');
    return;
  }

  // Ruaj sesionin
  localStorage.setItem('miaLoggedIn', JSON.stringify(user));

  // Kalo tek dashboard
  window.location.href = 'dashboard.html';
});

/* ── AUTO-REDIRECT nëse është tashmë logged in ── */
if (localStorage.getItem('miaLoggedIn')) {
  window.location.href = 'dashboard.html';
}
</script>

</body>
</html>
